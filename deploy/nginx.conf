# /etc/nginx/sites-available/burpee_trainer
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/burpee_trainer /etc/nginx/sites-enabled/

upstream phoenix {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Redirect bare HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name burpee.gustafrydholm.xyz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name burpee.gustafrydholm.xyz;

    ssl_certificate     /etc/letsencrypt/live/burpee.gustafrydholm.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/burpee.gustafrydholm.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Tell Phoenix it's behind HTTPS so force_ssl doesn't redirect-loop
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Host              $host;

    # Phoenix LiveView needs long-lived WebSocket connections
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;

    location / {
        proxy_pass http://phoenix;
    }
}
